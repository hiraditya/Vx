name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: macos-14 # M1 Apple Silicon
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM & MLIR
        run: |
          brew install llvm
          # Verify mlir-opt and lli are installed
          /opt/homebrew/opt/llvm/bin/mlir-opt --version
          /opt/homebrew/opt/llvm/bin/lli --version

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

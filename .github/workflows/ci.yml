name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest # Free Linux Tier
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 22
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y llvm-22-dev libmlir-22-dev mlir-22-tools libpolly-22-dev libclang-22-dev
          echo "/usr/lib/llvm-22/bin" >> $GITHUB_PATH

      - name: Check for locking primitives
        run: |
          if grep -rE '(Mutex|RwLock|Condvar|OnceLock|OnceCell|Semaphore|ShardedLock|DashMap|parking_lot|spin::|std::thread::park)' src/; then
            echo "Error: Locking primitives or thread-parking mechanisms are not allowed in the Vx compiler!"
            exit 1
          fi

      - name: Check Rust Formatting (cargo fmt)
        run: cargo fmt --all -- --check

      - name: Check Vx Formatting (vx-format)
        run: |
          cargo build --bin vx-format
          find tests stdlib -name "*.vx" -exec ./target/debug/vx-format {} +
          git diff --exit-code || (echo "Vx files are not formatted properly. Run vx-format locally." && exit 1)

      - name: Check Markdown Formatting (mdformat)
        run: |
          pipx install mdformat
          mdformat --check docs/ README.md

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

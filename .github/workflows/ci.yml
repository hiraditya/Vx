name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest # Free Linux Tier
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM & MLIR
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm mlir
          # Verify mlir-opt and lli are installed
          mlir-opt --version
          lli --version

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose
